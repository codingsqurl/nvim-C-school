<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>c-school // arch</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>_arch</text></svg>">
</head>
<body class="arch-desktop">
    <!-- Top Bar -->
    <div class="arch-topbar">
        <div class="arch-topbar-mobile-toggle" onclick="toggleSidebar()">&#9776;</div>
        <div class="arch-menu">
            <span>Applications</span><span>Places</span><span>System</span>
        </div>
        <div class="arch-workspaces-bar">
            <span class="arch-ws active">1</span>
            <span class="arch-ws">2</span><span class="arch-ws">3</span><span class="arch-ws">4</span><span class="arch-ws">5</span>
        </div>
        <div class="arch-systemtray">
            <span>&#128246;</span><span>&#128266;</span><span>&#128267;</span>
            <span class="arch-clock">Tue May 06 12:00</span>
        </div>
    </div>

    <!-- Desktop Area -->
    <div class="arch-desktop-area">
        <div class="arch-terminal-stack">
            <div class="arch-terminal">
                <div class="arch-term-header">
                    <div class="arch-term-dots">
                        <span class="arch-term-dot close"></span>
                        <span class="arch-term-dot minimize"></span>
                        <span class="arch-term-dot maximize"></span>
                    </div>
                    <div class="arch-term-title">c-school@academy:~/linux</div>
                </div>
                <div class="arch-term-body">
                    <div><span class="arch-term-prompt">c-school@academy</span>:<span style="color: #00d4aa;">~</span>$ <span class="arch-term-cursor"></span></div>
                </div>
            </div>

            <div class="arch-terminal">
                <div class="arch-term-header">
                    <div class="arch-term-dots">
                        <span class="arch-term-dot close"></span>
                        <span class="arch-term-dot minimize"></span>
                        <span class="arch-term-dot maximize"></span>
                    </div>
                    <div class="arch-term-title">c-school@academy:~/exercises</div>
                </div>
                <div class="arch-term-body">
                    <div style="font-size: 0.7rem;"><span class="arch-term-prompt">c-school@academy</span>:<span style="color: #ff6b35;">exercises</span>$ </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Dock -->
    <div class="arch-dock">
        <div class="arch-dock-item">
            <span class="arch-dock-icon" style="background: linear-gradient(135deg, #00aaff, #0088cc);">&#127968;</span>
            <span class="arch-dock-label">Home</span>
        </div>
        <div class="arch-dock-item">
            <span class="arch-dock-icon" style="background: linear-gradient(135deg, #00d4aa, #008866);">$</span>
            <span class="arch-dock-label">Terminal</span>
        </div>
        <div class="arch-dock-item">
            <span class="arch-dock-icon" style="background: linear-gradient(135deg, #ff6b35, #cc4400);">&#128187;</span>
            <span class="arch-dock-label">Linux</span>
        </div>
    </div>

    <!-- Mobile Sidebar -->
    <nav class="arch-sidebar" id="mobileSidebar">
        <a href="index.html" class="arch-sidebar-item active" onclick="toggleSidebar()">&#127968; Home</a>
        <a href="#" class="arch-sidebar-item" onclick="toggleSidebar()">$ Terminal</a>
        <a href="#" class="arch-sidebar-item" onclick="toggleSidebar()">&#128187; Linux</a>
    </nav>

    <script>
    function toggleSidebar() {
        document.getElementById('mobileSidebar').classList.toggle('open');
    }
    </script>
</body>
</html>
